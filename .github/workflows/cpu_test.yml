name: CPU Tests

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

env:
  GIT_LFS_SKIP_SMUDGE: "1"
  GIT_CLEAN_FLAGS: "-ffdx -e .venv/"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  UV_LINK_MODE: "copy"
  MUJOCO_GL: "egl"
  PYOPENGL_PLATFORM: "egl"
  PRE_COMMIT_HOME: "/pre-commit-cache"

jobs:
  precheck:
    # Decide whether the `pull_request` run is redundant with the `push` run.
    # If the PR branch already contains every commit on the base ref, the
    # merge would fast-forward and the merge tree equals the head tree that
    # `push` already tested. For `push` / `workflow_dispatch`, always run.
    #
    # Safe to run on any author: this job only hits the GitHub compare API,
    # it does not check out fork code. The author-association gate is on
    # `cpu-tests` below so fork PRs still skip the runner-heavy job.
    #
    # Note: we infer "push covered this tree" purely from the FF compare
    # status; we don't query the push workflow's actual conclusion for the
    # same SHA. In practice push lands after the PR's skip-path status job,
    # so branch protection sees push's real result. If `push` is ever
    # gated/filtered so it doesn't fire for a SHA, revisit this assumption.
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ steps.decide.outputs.run-tests }}
    steps:
      - name: Decide whether to run tests
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Event=$EVENT_NAME; always run tests."
            echo "run-tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          status=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/compare/${BASE_SHA}...${HEAD_SHA}" \
            | jq -r '.status' || echo "unknown")
          echo "Compare status: $status"
          case "$status" in
            identical|ahead)
              echo "Head contains base; push run already covered this tree. Skipping."
              echo "run-tests=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Head does not strictly contain base; running tests."
              echo "run-tests=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  cpu-tests:
    needs: precheck
    # Block PRs from non-org accounts to keep fork code off our runners.
    # `push` and `workflow_dispatch` already require write access, so the
    # short-circuit lets them through unchanged. A skipped job counts as a
    # passing required check, which preserves the pre-PR behaviour for forks.
    if: >-
      needs.precheck.outputs.run-tests == 'true'
      && (github.event_name != 'pull_request'
          || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
          || github.event.pull_request.user.login == 'claude[bot]')
    name: CPU Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          lfs: false

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libegl-mesa0 libgl1 libglx-mesa0 libgles2 mesa-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Verify uv installation
        run: |
          which uv
          uv --version

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra libero

      - name: Activate virtual environment and verify Python
        run: |
          source .venv/bin/activate
          which python3
          python3 --version

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Configure wandb
        run: |
          source .venv/bin/activate
          wandb offline

      - name: Check disk space
        run: df -h /dev/shm

      - name: Run CPU tests with coverage
        # Authenticate to the HF Hub via env vars instead of `hf auth login`.
        # The CLI login does an eager whoami() network call to validate the token;
        # that call gets rate-limited (429) and fails the whole job at setup before
        # any test runs. huggingface_hub reads HF_TOKEN / HUGGINGFACE_HUB_TOKEN with
        # no network call. A handful of tests still need the token: test_hub.py
        # pushes to the Hub, and the dataset tests get a higher (authenticated)
        # rate limit on public-repo downloads.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source .venv/bin/activate
          mkdir -p /tmp/libero-assets/libero/libero
          export LIBERO_CONFIG_PATH="$(pwd)/.github/assets/libero"
          echo LIBERO_CONFIG_PATH is $LIBERO_CONFIG_PATH
          python3 -c "import sys; print(sys.path)"
          python3 -c "import libero.libero" && echo "LIBERO config set successfully."
          echo "Running cpu based pytest and generating coverage report..."
          pytest -m "not gpu" -n auto -v --cov=lerobot/ --cov-report=xml:cpu_test/cpu_test.xml --ignore=tests/planner/test_planner.py --ignore tests/utils/test_libero_utils.py --deselect=tests/envs/test_factory.py::TestMakeEnv::test_make_env_async_vector_env --deselect=tests/envs/test_factory.py::TestMakeEnv::test_make_env_sync_vector_env tests/
          echo "Pytest execution and coverage report generation completed."

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./cpu_test/cpu_test.xml
          flags: cpu
          name: cpu-coverage
          fail_ci_if_error: false

  status:
    # Stable status check for branch protection. Passes when `cpu-tests`
    # succeeded OR was skipped because `precheck` determined the push run
    # already covered this tree. Point required-status-checks at this job.
    needs: [precheck, cpu-tests]
    if: always()
    name: CPU Tests Status
    runs-on: ubuntu-latest
    steps:
      - name: Report aggregated result
        env:
          PRECHECK_RESULT: ${{ needs.precheck.result }}
          TESTS_RESULT: ${{ needs.cpu-tests.result }}
        run: |
          set -euo pipefail
          echo "precheck=$PRECHECK_RESULT cpu-tests=$TESTS_RESULT"
          if [ "$PRECHECK_RESULT" != "success" ]; then
            echo "Pre-check did not succeed."
            exit 1
          fi
          case "$TESTS_RESULT" in
            success|skipped) echo "OK" ;;
            *) exit 1 ;;
          esac
