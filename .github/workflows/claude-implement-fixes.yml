name: Claude Implement Fixes

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # GitHub does NOT fire pull_request_review_comment.created for line comments
  # bundled into a submitted review — only for standalone replies via the
  # inline "Reply" button. Listening to pull_request_review.submitted catches
  # the bundled-line-comment case (e.g. "Add review" → "Submit review" with
  # @claude fix in a line comment and an empty review body).
  pull_request_review:
    types: [submitted]

# Serialize implement-fix runs against the same PR so two rapid `@claude fix`
# comments don't race on the PR branch.
concurrency:
  group: claude-implement-fixes-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  implement:
    # Trust gate per event source: only humans (user.type == 'User') with
    # OWNER/MEMBER/COLLABORATOR association on this repo may trigger
    # `@claude fix`. Bots — including claude[bot] — are NOT permitted to
    # trigger; this also closes the only realistic review→fix loop, since a
    # `@claude fix` string in a claude[bot] review summary can no longer fire
    # this workflow. This workflow holds `contents: write` + bypassPermissions,
    # so the blast radius for a wrong allow is high.
    if: >-
      (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && github.event.comment.user.type == 'User'
        && contains(github.event.comment.body, '@claude fix')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
      || (
        github.event_name == 'pull_request_review_comment'
        && github.event.comment.user.type == 'User'
        && contains(github.event.comment.body, '@claude fix')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
      || (
        github.event_name == 'pull_request_review'
        && github.event.review.user.type == 'User'
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write  # claude-code-action does an OIDC handshake at startup
    steps:
      # For pull_request_review.submitted, scan the review's line comments
      # (which the event payload does not include) for the trigger phrase.
      # If absent, exit before paying for a Claude run. For comment events,
      # the if: above already filtered on body, so this step is a no-op.
      - name: Gate on @claude fix presence
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Untrusted user input — never interpolate directly into shell.
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request_review" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LINE_BODIES=$(gh api \
            "/repos/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/comments" \
            --jq 'map(.body) | join("\n---\n")')
          if printf '%s\n%s\n' "$REVIEW_BODY" "$LINE_BODIES" | grep -qF '@claude fix'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No '@claude fix' found in submitted review (body or any line comment); skipping."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.should_run == 'true'
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.should_run == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # No bot can TRIGGER this workflow (per the job-level `if:` above).
          # `allowed_bots` here governs which bot-authored comments the agent
          # treats as trusted input while resolving feedback — claude[bot]
          # review summaries remain trustworthy in that role. Never `*` on a
          # public repo (per the action's docs warning).
          allowed_bots: "claude[bot]"
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7[1m]' }}
            --permission-mode bypassPermissions
          prompt: |
            A reviewer asked you to address review feedback on this PR.

            1. Read all review comments on the PR (resolved and unresolved).
               Some line comments may have been bundled into a submitted review
               — fetch them with:
                   gh api /repos/${{ github.repository }}/pulls/${{ github.event.issue.number || github.event.pull_request.number }}/reviews/<review_id>/comments
            2. For each actionable comment containing `@claude fix`, implement
               the fix on the PR's branch.
            3. Skip comments that are questions, taste preferences, or already addressed.
            4. Decide whether to run tests:
               - If the diff is purely documentation, comments, formatting,
                 string-literal text, or otherwise CANNOT change runtime behavior,
                 you MAY skip tests. Be honest about confidence — when in doubt, run.
                 If you skip, the commit body MUST contain a line of the form:
                     tests: skipped — <one-sentence reason>
               - Otherwise (changes touching imports, function bodies, control
                 flow, types, configs read at runtime, dependencies, or build
                 manifests): run `pytest -m "not gpu" -n auto`. Scope to the
                 changed subtree where possible (e.g. `pytest tests/policies/test_pi05.py`
                 for a pi05 change) to keep the run fast. The commit body MUST contain:
                     tests: passed — <exact command run>
                 If tests fail: do NOT push; reply on the relevant PR comment
                 explaining the failure and stop.
            5. Make ONE commit at the end of the session that addresses every
               comment you decided to act on — do NOT push one commit per
               comment. Subject line (must be < 80 chars per CLAUDE.md):

                   [claude-fix] address review feedback on #${{ github.event.issue.number || github.event.pull_request.number }}

               Commit body: a bulleted list, one bullet per addressed comment,
               followed by the `tests:` line from step 4:

                   - addresses @<reviewer> (<short topic>): <what you changed>
                   ...
                   tests: passed — pytest -m "not gpu" tests/policies/test_pi05.py
                   (or: tests: skipped — comment-only change, no runtime impact)

               Then push the single commit to the PR branch.
            6. Reply individually to each addressed comment on the PR with
               what you changed and the new commit SHA. Every reply MUST start
               with `[claude-fix]` so reviewers can scan/filter.
            7. If a comment is unclear or you disagree, reply asking for clarification
               instead of guessing.
